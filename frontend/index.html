<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dispatch Board — GHL Integration</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- ═══════════════════════════════════════════════════════════
     CONFIGURATION — Set your API keys here
     ═══════════════════════════════════════════════════════════ -->
<script>
// CONFIG loaded from backend proxy at /api/config (keeps API keys server-side).
// Defaults shown here are used if the proxy is unreachable (local dev / demo mode).
const CONFIG = {
  GOOGLE_MAPS_API_KEY: '',
  GHL_API_KEY: '',
  GHL_LOCATION_ID: '',
  GHL_BASE_URL: '',
  BACKEND_URL: '',  // Auto-detected: same origin as the page
  SYNC_INTERVAL_MS: 60000,
  MAP_CENTER: { lat: 41.700, lng: -83.610 },
  MAP_ZOOM: 11,
  COMPANY_HQ: { lat: 41.757, lng: -83.572, label: 'HQ — Temperance' },
};

// Fetch config from backend proxy on load
(async function loadConfig() {
  try {
    const res = await fetch('/api/config');
    if (res.ok) {
      const cfg = await res.json();
      CONFIG.GOOGLE_MAPS_API_KEY = cfg.googleMapsKey || '';
      CONFIG.GHL_LOCATION_ID = cfg.locationId || '';
      CONFIG.BACKEND_URL = ''; // Use relative URLs (same origin)
      CONFIG.MAP_CENTER = cfg.mapCenter || CONFIG.MAP_CENTER;
      CONFIG.MAP_ZOOM = cfg.mapZoom || CONFIG.MAP_ZOOM;
      CONFIG.COMPANY_HQ = cfg.companyHQ || CONFIG.COMPANY_HQ;
      CONFIG.SYNC_INTERVAL_MS = cfg.syncIntervalMs || CONFIG.SYNC_INTERVAL_MS;
      console.log('[Config] Loaded from backend proxy');
    }
  } catch (e) {
    console.log('[Config] Backend not reachable — running in standalone demo mode');
  }
})();
</script>

<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a2235;
  --bg-card-hover: #1f2a40;
  --bg-surface: #0f1520;
  --border: #1e293b;
  --border-active: #334155;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-blue: #3b82f6;
  --accent-blue-glow: rgba(59,130,246,0.15);
  --accent-green: #10b981;
  --accent-green-glow: rgba(16,185,129,0.15);
  --accent-amber: #f59e0b;
  --accent-amber-glow: rgba(245,158,11,0.15);
  --accent-red: #ef4444;
  --accent-red-glow: rgba(239,68,68,0.15);
  --accent-purple: #8b5cf6;
  --accent-purple-glow: rgba(139,92,246,0.15);
  --accent-cyan: #06b6d4;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}

.app {
  display: grid;
  grid-template-columns: 320px 1fr 300px;
  grid-template-rows: 56px 1fr;
  height: 100vh;
  gap: 0;
}

/* ── TOP BAR ── */
.topbar {
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
  z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.logo-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff;
}
.topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
.topbar h1 span { color: var(--text-muted); font-weight: 400; }
.topbar-center { display: flex; gap: 6px; align-items: center; }
.view-btn {
  padding: 6px 14px; border-radius: 6px; border: 1px solid transparent;
  background: transparent; color: var(--text-muted); font-family: inherit;
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s;
}
.view-btn:hover { color: var(--text-secondary); background: var(--bg-card); }
.view-btn.active { background: var(--accent-blue-glow); color: var(--accent-blue); border-color: rgba(59,130,246,0.2); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.date-display {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted);
  background: var(--bg-card); padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
}
.sync-badge {
  display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent-green);
  background: var(--accent-green-glow); padding: 5px 10px; border-radius: 20px;
  border: 1px solid rgba(16,185,129,0.2); cursor: pointer;
}
.sync-badge.error { color: var(--accent-red); background: var(--accent-red-glow); border-color: rgba(239,68,68,0.2); }
.sync-badge.syncing { color: var(--accent-amber); background: var(--accent-amber-glow); border-color: rgba(245,158,11,0.2); }
.sync-dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── LEFT PANEL ── */
.panel-left {
  background: var(--bg-surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel-header { padding: 16px; border-bottom: 1px solid var(--border); }
.panel-header h2 {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-secondary); margin-bottom: 10px;
}
.search-box {
  width: 100%; padding: 8px 12px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary);
  font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--accent-blue); }
.search-box::placeholder { color: var(--text-muted); }
.filter-tabs { display: flex; padding: 8px 16px; gap: 4px; border-bottom: 1px solid var(--border); }
.filter-tab {
  padding: 5px 10px; font-size: 11px; font-weight: 500; border-radius: 5px;
  border: none; background: transparent; color: var(--text-muted); cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.filter-tab:hover { color: var(--text-secondary); }
.filter-tab.active { background: var(--bg-card); color: var(--text-primary); }
.filter-tab .count {
  display: inline-block; min-width: 16px; text-align: center; padding: 1px 5px;
  border-radius: 8px; font-size: 10px; margin-left: 4px; background: var(--border);
}
.jobs-list { flex: 1; overflow-y: auto; padding: 8px; }
.jobs-list::-webkit-scrollbar { width: 4px; }
.jobs-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── JOB CARD ── */
.job-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px; margin-bottom: 6px; cursor: grab; transition: all 0.2s;
  position: relative; overflow: hidden;
}
.job-card:active { cursor: grabbing; }
.job-card:hover { border-color: var(--border-active); background: var(--bg-card-hover); transform: translateY(-1px); box-shadow: var(--shadow); }
.job-card.dragging { opacity: 0.5; transform: scale(0.96); }
.job-card .status-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.job-card .job-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; padding-left: 8px; }
.job-card .job-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
.job-card .job-type-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.badge-sales { background: var(--accent-blue-glow); color: var(--accent-blue); border: 1px solid rgba(59,130,246,0.2); }
.badge-install { background: var(--accent-purple-glow); color: var(--accent-purple); border: 1px solid rgba(139,92,246,0.2); }
.badge-service { background: var(--accent-amber-glow); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.2); }
.job-card .job-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; padding-left: 8px; }
.job-card .job-address { font-size: 11px; color: var(--text-muted); padding-left: 8px; margin-bottom: 8px; line-height: 1.4; }
.job-card .job-meta { display: flex; align-items: center; gap: 10px; padding-left: 8px; font-size: 11px; color: var(--text-muted); }
.job-card .job-meta svg { width: 12px; height: 12px; flex-shrink: 0; }
.job-meta-item { display: flex; align-items: center; gap: 4px; }
.job-card .assigned-to {
  display: flex; align-items: center; gap: 6px; padding: 6px 8px; margin-top: 8px;
  background: var(--bg-surface); border-radius: 6px; font-size: 11px;
}
.assigned-avatar {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: #fff;
}
.status-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 500;
}

/* ── MAP AREA ── */
.map-area { position: relative; overflow: hidden; }
#googleMap { width: 100%; height: 100%; }
.map-legend {
  position: absolute; bottom: 16px; left: 16px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px;
  z-index: 30; font-size: 11px;
}
.legend-title { font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 8px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; color: var(--text-secondary); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.map-controls {
  position: absolute; top: 12px; right: 12px; z-index: 30; display: flex; gap: 6px;
}
.map-ctrl-btn {
  padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-secondary); font-family: inherit;
  font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s;
}
.map-ctrl-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
.map-ctrl-btn.active { background: var(--accent-blue-glow); color: var(--accent-blue); border-color: rgba(59,130,246,0.3); }

/* ── Route info panel ── */
.route-panel {
  position: absolute; bottom: 16px; right: 16px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px;
  z-index: 30; min-width: 240px; max-width: 300px; display: none;
  box-shadow: var(--shadow-lg);
}
.route-panel.visible { display: block; }
.route-panel h4 { font-size: 12px; font-weight: 600; color: var(--accent-cyan); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
.route-stop { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; position: relative; padding-left: 4px; }
.route-stop-num {
  width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.route-stop-info { font-size: 11px; }
.route-stop-name { font-weight: 600; color: var(--text-primary); }
.route-stop-time { color: var(--text-muted); font-size: 10px; }
.route-line { position: absolute; left: 14px; top: 24px; width: 2px; height: calc(100% - 2px); background: var(--border); }
.route-summary { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; }
.route-summary strong { color: var(--text-primary); }
.route-close {
  position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 14px;
}

/* ── RIGHT PANEL ── */
.panel-right {
  background: var(--bg-surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.crew-list { flex: 1; overflow-y: auto; padding: 8px; }
.crew-list::-webkit-scrollbar { width: 4px; }
.crew-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.crew-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px; margin-bottom: 6px; transition: all 0.2s;
}
.crew-card:hover { border-color: var(--border-active); }
.crew-card.drop-target { border-color: var(--accent-blue); background: var(--accent-blue-glow); box-shadow: 0 0 20px rgba(59,130,246,0.1); }
.crew-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.crew-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.crew-info { flex: 1; }
.crew-name { font-size: 13px; font-weight: 600; }
.crew-role { font-size: 11px; color: var(--text-muted); }
.crew-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.crew-status-dot.available { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
.crew-status-dot.busy { background: var(--accent-amber); box-shadow: 0 0 6px var(--accent-amber); }
.crew-status-dot.offline { background: var(--text-muted); }
.crew-capacity { margin-top: 6px; }
.capacity-bar-bg { height: 4px; background: var(--bg-surface); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
.capacity-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.capacity-text { font-size: 10px; color: var(--text-muted); display: flex; justify-content: space-between; }
.crew-jobs { margin-top: 8px; }
.crew-job-mini {
  display: flex; align-items: center; gap: 6px; padding: 4px 8px;
  background: var(--bg-surface); border-radius: 5px; font-size: 11px; margin-bottom: 3px; color: var(--text-secondary);
}
.crew-job-mini .mini-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.crew-zone { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 4px; margin-top: 6px; }
.crew-route-btn {
  margin-top: 8px; width: 100%; padding: 5px 0; background: transparent;
  border: 1px dashed var(--accent-cyan); border-radius: 6px; color: var(--accent-cyan);
  font-family: inherit; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s;
}
.crew-route-btn:hover { background: rgba(6,182,212,0.08); }

/* ── STATS BAR ── */
.stats-bar { display: flex; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.stat-chip {
  display: flex; align-items: center; gap: 5px; padding: 4px 10px;
  background: var(--bg-card); border-radius: 6px; font-size: 11px; border: 1px solid var(--border);
}
.stat-chip .stat-dot { width: 6px; height: 6px; border-radius: 50%; }
.stat-chip .stat-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text-primary); }
.stat-chip .stat-label { color: var(--text-muted); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg);
  width: 440px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg);
}
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-close {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.modal-body { padding: 20px; }
.modal-field { margin-bottom: 14px; }
.modal-field label {
  display: block; font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px;
}
.modal-field .field-val { font-size: 14px; color: var(--text-primary); }
.modal-field select, .modal-field input[type="text"] {
  width: 100%; padding: 8px 12px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-primary); font-family: inherit; font-size: 13px; outline: none;
}
.modal-actions { display: flex; gap: 8px; padding: 16px 20px; border-top: 1px solid var(--border); }
.btn { padding: 8px 18px; border-radius: var(--radius); border: 1px solid var(--border); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--bg-card); }

/* ── TOAST ── */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 16px; font-size: 13px; box-shadow: var(--shadow-lg);
  display: flex; align-items: center; gap: 8px; animation: slideIn 0.3s ease; min-width: 280px;
}
@keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

.fade-in { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── Google Maps Info Window ── */
.gm-style-iw-c { background: #1a2235 !important; border-radius: 10px !important; padding: 0 !important; border: 1px solid #334155 !important; box-shadow: 0 8px 40px rgba(0,0,0,0.5) !important; }
.gm-style-iw-d { overflow: auto !important; padding: 0 !important; }
.gm-style-iw-tc::after { background: #1a2235 !important; }
.gm-ui-hover-effect { filter: invert(1) !important; top: 4px !important; right: 4px !important; }
.info-window { font-family: 'DM Sans', sans-serif; padding: 14px 16px; min-width: 220px; }
.iw-title { font-size: 14px; font-weight: 600; color: #f1f5f9; margin-bottom: 4px; }
.iw-address { font-size: 11px; color: #94a3b8; margin-bottom: 8px; line-height: 1.3; }
.iw-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
.iw-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.iw-assign-btn {
  margin-top: 10px; width: 100%; padding: 7px 0; background: #3b82f6; color: #fff;
  border: none; border-radius: 6px; font-family: inherit; font-size: 12px;
  font-weight: 600; cursor: pointer;
}
.iw-assign-btn:hover { background: #2563eb; }

/* ── Fallback map ── */
.fallback-map { width: 100%; height: 100%; position: relative; background: radial-gradient(circle at 30% 40%, rgba(59,130,246,0.04) 0%, transparent 50%), radial-gradient(circle at 70% 60%, rgba(139,92,246,0.04) 0%, transparent 50%), #0a0e17; }
.fallback-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(30,41,59,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(30,41,59,0.2) 1px,transparent 1px); background-size: 60px 60px; pointer-events: none; }
.fallback-pin { position: absolute; width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; z-index: 10; transition: transform 0.2s; }
.fallback-pin:hover { transform: scale(1.8); z-index: 20; }

@media (max-width: 1100px) { .app { grid-template-columns: 260px 1fr 240px; } }
</style>
</head>
<body>

<div class="app" id="app">
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">DB</div>
      <h1>Dispatch Board <span>/ GHL Sync</span></h1>
    </div>
    <div class="topbar-center">
      <button class="view-btn active" data-view="map">🗺 Map</button>
      <button class="view-btn" data-view="timeline">📅 Timeline</button>
      <button class="view-btn" data-view="kanban">📋 Kanban</button>
    </div>
    <div class="topbar-right">
      <div class="date-display" id="dateDisplay"></div>
      <div class="sync-badge" id="syncBadge" onclick="GHL.syncNow()">
        <span class="sync-dot"></span>
        <span id="syncLabel">GHL Synced</span>
      </div>
    </div>
  </header>

  <div class="panel-left">
    <div class="panel-header">
      <h2>Jobs & Appointments</h2>
      <input type="text" class="search-box" placeholder="Search jobs, customers…" id="searchBox">
    </div>
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="all">All <span class="count" id="countAll">0</span></button>
      <button class="filter-tab" data-filter="unassigned">Unassigned <span class="count" id="countUnassigned">0</span></button>
      <button class="filter-tab" data-filter="sales">Sales <span class="count" id="countSales">0</span></button>
      <button class="filter-tab" data-filter="install">Install <span class="count" id="countInstall">0</span></button>
    </div>
    <div class="jobs-list" id="jobsList"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// GHL API INTEGRATION LAYER
// ═══════════════════════════════════════════════════════════════
//
// This layer connects to GoHighLevel's API v2 to:
//   1. PULL appointments, contacts, and users (team members)
//   2. PUSH dispatch assignments back via Custom Fields or Custom Objects
//   3. Auto-sync on an interval
//
// ARCHITECTURE FOR PRODUCTION:
//   Browser (iFrame) → Your Backend Proxy → GHL API
//   The proxy holds the API key server-side so it's never exposed in the iFrame.
//   Set CONFIG.BACKEND_URL to your proxy, and it will be used instead of direct calls.
//
// ═══════════════════════════════════════════════════════════════

const GHL = {
  // ── Internal state ──
  _lastSync: null,
  _syncTimer: null,

  // ── HTTP helper — routes through backend proxy ──
  async _fetch(endpoint, options = {}) {
    // In production: calls /api/* on the same origin (the backend proxy).
    // The proxy adds the GHL API key and forwards to GHL.
    const url = endpoint;
    try {
      const res = await fetch(url, {
        ...options,
        headers: { 'Content-Type': 'application/json', ...options.headers },
      });
      if (!res.ok) throw new Error(`API ${res.status}: ${res.statusText}`);
      return await res.json();
    } catch (err) {
      console.error('[GHL]', err);
      throw err;
    }
  },

  // ═════════════════════════════════════
  // PULL — Read from GHL
  // ═════════════════════════════════════

  /** Fetch today's appointments via backend proxy */
  async getAppointments(dateStr) {
    const date = dateStr || new Date().toISOString().split('T')[0];
    const data = await this._fetch(`/api/appointments?date=${date}`);
    return (data.events || []).map(evt => this._mapAppointmentToJob(evt));
  },

  /** Fetch contact details via proxy */
  async getContact(contactId) {
    const data = await this._fetch(`/api/contacts/${contactId}`);
    return data.contact || null;
  },

  /** Fetch all team members via proxy */
  async getUsers() {
    const data = await this._fetch(`/api/users`);
    return (data.users || []).map(u => this._mapUserToCrew(u));
  },

  /** Fetch dispatch assignment records via proxy */
  async getDispatchAssignments() {
    try {
      const data = await this._fetch(`/api/dispatch`);
      return data.records || [];
    } catch {
      return [];
    }
  },

  // ═════════════════════════════════════
  // PUSH — Write to GHL
  // ═════════════════════════════════════

  /** Save a dispatch assignment via proxy */
  async saveAssignment(jobId, crewId, status) {
    try {
      await this._fetch(`/api/dispatch`, {
        method: 'POST',
        body: JSON.stringify({
          appointmentId: jobId,
          assignedTo: crewId,
          status: status,
        }),
      });
      return true;
    } catch (err) {
      console.warn('[GHL] Assignment save failed, using local state:', err);
      return false;
    }
  },

  /** Update appointment fields via proxy */
  async updateAppointmentFields(appointmentId, fields) {
    try {
      await this._fetch(`/api/appointments/${appointmentId}`, {
        method: 'PUT',
        body: JSON.stringify(fields),
      });
      return true;
    } catch (err) {
      console.warn('[GHL] Appointment update failed:', err);
      return false;
    }
  },

  /** Add a dispatch note to the contact via proxy */
  async addDispatchNote(contactId, noteText) {
    try {
      await this._fetch(`/api/contacts/${contactId}/notes`, {
        method: 'POST',
        body: JSON.stringify({ body: noteText }),
      });
    } catch (err) {
      console.warn('[GHL] Note add failed:', err);
    }
  },

  // ═════════════════════════════════════
  // SYNC — Orchestration
  // ═════════════════════════════════════

  async syncNow() {
    const badge = document.getElementById('syncBadge');
    const label = document.getElementById('syncLabel');
    badge.className = 'sync-badge syncing';
    label.textContent = 'Syncing…';

    try {
      // Check if backend proxy is reachable and configured
      let backendReady = false;
      try {
        const health = await this._fetch('/api/health');
        backendReady = health.ghl_configured === true;
      } catch { backendReady = false; }

      if (!backendReady) {
        // Running in demo mode with mock data
        badge.className = 'sync-badge';
        label.textContent = 'Demo Mode';
        this._lastSync = new Date();
        return;
      }

      // Pull appointments + users in parallel
      const [ghlJobs, ghlCrew, assignments] = await Promise.all([
        this.getAppointments(),
        this.getUsers(),
        this.getDispatchAssignments(),
      ]);

      // Merge GHL data into local state
      if (ghlJobs.length > 0) {
        jobs = ghlJobs;
        // Apply saved assignments
        assignments.forEach(a => {
          const job = jobs.find(j => j.id === a.fields?.appointment_id);
          if (job) {
            job.assignedTo = a.fields?.assigned_to || null;
            job.status = a.fields?.status || job.status;
          }
        });
      }
      if (ghlCrew.length > 0) {
        crew = ghlCrew;
      }

      this._lastSync = new Date();
      badge.className = 'sync-badge';
      label.textContent = 'GHL Synced';
      renderAll();
      showToast('✓ Synced with GoHighLevel', 'success');

    } catch (err) {
      badge.className = 'sync-badge error';
      label.textContent = 'Sync Error';
      showToast('⚠️ GHL sync failed — using local data', 'warn');
    }
  },

  startAutoSync() {
    this.syncNow();
    this._syncTimer = setInterval(() => this.syncNow(), CONFIG.SYNC_INTERVAL_MS);
  },

  // ═════════════════════════════════════
  // DATA MAPPERS — GHL → Dispatch Board
  // ═════════════════════════════════════

  _mapAppointmentToJob(evt) {
    // Map a GHL calendar event to our job format
    const startDate = new Date(evt.startTime || evt.start);
    const type = this._inferJobType(evt);
    return {
      id: evt.id,
      title: evt.title || evt.name || 'Appointment',
      type: type,
      customer: evt.contact?.name || evt.title || 'Unknown',
      address: evt.address || evt.location || evt.contact?.address || '',
      time: startDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
      status: evt.status === 'confirmed' ? 'assigned' : 'unassigned',
      assignedTo: evt.assignedUserId || null,
      zone: 'north', // Determined by geocoding in production
      lat: evt.contact?.latitude || CONFIG.MAP_CENTER.lat + (Math.random() - 0.5) * 0.1,
      lng: evt.contact?.longitude || CONFIG.MAP_CENTER.lng + (Math.random() - 0.5) * 0.1,
      priority: 'medium',
      notes: `GHL Appt — ${evt.notes || evt.description || ''}`,
      ghlEventId: evt.id,
      ghlContactId: evt.contactId,
    };
  },

  _mapUserToCrew(user) {
    const COLORS = ['#3b82f6','#8b5cf6','#ef4444','#f59e0b','#10b981','#06b6d4','#ec4899','#f97316'];
    const initials = ((user.firstName || '?')[0] + (user.lastName || '?')[0]).toUpperCase();
    const role = (user.role || '').toLowerCase();
    const type = role.includes('install') || role.includes('tech') ? 'install' : 'sales';
    return {
      id: user.id,
      name: `${user.firstName || ''} ${user.lastName || ''}`.trim(),
      role: user.role || 'Team Member',
      type: type,
      status: 'available',
      zone: 'north',
      color: COLORS[Math.abs(this._hash(user.id)) % COLORS.length],
      maxJobs: type === 'install' ? 3 : 6,
      avatar: initials,
    };
  },

  _inferJobType(evt) {
    const text = `${evt.title} ${evt.calendarName} ${evt.notes || ''}`.toLowerCase();
    if (text.match(/install|panel|inverter|battery|charger|mount/)) return 'install';
    if (text.match(/inspect|service|repair|maintain|check/)) return 'service';
    return 'sales';
  },

  _hash(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    return h;
  },

  async _findAssignment(jobId) {
    const records = await this.getDispatchAssignments();
    return records.find(r => r.fields?.appointment_id === jobId) || null;
  },
};

// Google Maps loader — waits for config from backend proxy, then loads Maps JS.
// If the proxy provides a key, uses that. If CONFIG already has a key set (standalone
// mode), uses that immediately. Otherwise, falls back to the dot-map.
function loadGoogleMapsScript(apiKey) {
  if (!apiKey) return;
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initMap&libraries=geometry`;
  s.async = true; s.defer = true;
  s.onerror = () => showToast('⚠️ Google Maps failed to load — check API key', 'warn');
  document.head.appendChild(s);
}

// Attempt to load map after config is fetched (short delay to let loadConfig finish)
setTimeout(() => {
  if (CONFIG.GOOGLE_MAPS_API_KEY) {
    loadGoogleMapsScript(CONFIG.GOOGLE_MAPS_API_KEY);
  }
}, 300);

window.initMap = function() {
  mapsLoaded = true;
  document.getElementById('googleMap').innerHTML = '';

  map = new google.maps.Map(document.getElementById('googleMap'), {
    center: CONFIG.MAP_CENTER, zoom: CONFIG.MAP_ZOOM, styles: MAP_STYLES,
    disableDefaultUI: true, zoomControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.LEFT_BOTTOM },
    gestureHandling: 'greedy', backgroundColor: '#0a0e17',
  });

  infoWindow = new google.maps.InfoWindow();
  trafficLayer = new google.maps.TrafficLayer();
  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({
    map: map, suppressMarkers: true,
    polylineOptions: { strokeColor: '#06b6d4', strokeWeight: 4, strokeOpacity: 0.8 },
  });

  drawZones();
  renderMapMarkers();
  showToast('✓ Google Maps loaded', 'success');
};

function createPinSVG(color, label) {
  return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="46" viewBox="0 0 36 46">
      <defs><filter id="s" x="-20%" y="-10%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
      </filter></defs>
      <path d="M18 0C8.06 0 0 8.06 0 18c0 12.6 16.2 26.4 17.1 27.2a1.5 1.5 0 001.8 0C19.8 44.4 36 30.6 36 18 36 8.06 27.94 0 18 0z" fill="${color}" filter="url(#s)"/>
      <circle cx="18" cy="17" r="10" fill="rgba(0,0,0,0.25)"/>
      <text x="18" y="21" text-anchor="middle" fill="white" font-family="DM Sans,sans-serif" font-size="11" font-weight="700">${label}</text>
    </svg>`);
}

function renderMapMarkers() {
  if (!map) return;
  Object.values(markers).forEach(m => m.setMap(null));
  markers = {};

  jobs.forEach(job => {
    const st = STATUSES[job.status];
    const assigned = job.assignedTo ? crew.find(c => c.id === job.assignedTo) : null;
    const pinColor = assigned ? assigned.color : st.color;
    const pinLabel = job.type === 'sales' ? 'S' : job.type === 'install' ? 'I' : '★';

    const marker = new google.maps.Marker({
      position: { lat: job.lat, lng: job.lng }, map,
      icon: { url: createPinSVG(pinColor, pinLabel), scaledSize: new google.maps.Size(36, 46), anchor: new google.maps.Point(18, 46) },
      title: job.customer, optimized: false,
    });

    marker.addListener('click', () => {
      infoWindow.setContent(`
        <div class="info-window">
          <div class="iw-title">${job.customer}</div>
          <div class="iw-address">${job.address}</div>
          <div class="iw-row"><span class="iw-dot" style="background:${st.color}"></span>${st.label}<span style="margin-left:auto;color:${pinColor};font-weight:600">${job.type.toUpperCase()}</span></div>
          ${assigned ? `<div class="iw-row"><span style="width:18px;height:18px;border-radius:50%;background:${assigned.color};display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff">${assigned.avatar}</span><span style="color:#f1f5f9">${assigned.name}</span></div>` : ''}
          <button class="iw-assign-btn" onclick="openJobModal('${job.id}')">${assigned ? 'Edit Assignment' : 'Route This Job'}</button>
        </div>`);
      infoWindow.open(map, marker);
    });
    markers[job.id] = marker;
  });
}

function drawZones() {
  if (!map) return;
  zonePolygons.forEach(p => p.setMap(null)); zoneLabels.forEach(l => l.setMap(null));
  zonePolygons = []; zoneLabels = [];
  Object.values(ZONES).forEach(zone => {
    const poly = new google.maps.Polygon({ paths: zone.paths, strokeColor: zone.color, strokeOpacity: 0.5, strokeWeight: 2, fillColor: zone.color, fillOpacity: 0.06, map });
    zonePolygons.push(poly);
    const bounds = new google.maps.LatLngBounds();
    zone.paths.forEach(p => bounds.extend(p));
    const lbl = new google.maps.Marker({
      position: { lat: bounds.getNorthEast().lat() - 0.005, lng: bounds.getCenter().lng() }, map,
      icon: { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="100" height="24"><rect width="100" height="24" rx="4" fill="${zone.color}" opacity="0.2"/><text x="50" y="16" text-anchor="middle" fill="${zone.color}" font-family="DM Sans,sans-serif" font-size="10" font-weight="600" letter-spacing="1">${zone.label.toUpperCase()}</text></svg>`), scaledSize: new google.maps.Size(100, 24), anchor: new google.maps.Point(50, 12) }, clickable: false,
    });
    zoneLabels.push(lbl);
  });
}

function toggleZones() { zonesVisible = !zonesVisible; zonePolygons.forEach(p => p.setMap(zonesVisible ? map : null)); zoneLabels.forEach(l => l.setMap(zonesVisible ? map : null)); document.getElementById('toggleZones').classList.toggle('active', zonesVisible); }
function toggleTraffic() { if (!trafficLayer) return; trafficVisible = !trafficVisible; trafficLayer.setMap(trafficVisible ? map : null); document.getElementById('toggleTraffic').classList.toggle('active', trafficVisible); }
function fitAllMarkers() { if (!map) return; const b = new google.maps.LatLngBounds(); jobs.forEach(j => b.extend({lat:j.lat,lng:j.lng})); map.fitBounds(b, 50); }

function highlightPin(jobId) { if (mapsLoaded && markers[jobId]) { markers[jobId].setAnimation(google.maps.Animation.BOUNCE); setTimeout(() => { if(markers[jobId]) markers[jobId].setAnimation(null); }, 1400); } }
function unhighlightPin(jobId) { if (mapsLoaded && markers[jobId]) markers[jobId].setAnimation(null); }

// ═══════════════════════════════════════════════════════════════
// ROUTE OPTIMIZATION — Uses Google Directions API
// ═══════════════════════════════════════════════════════════════
//
// For each crew member, calculates the optimal stop order
// starting from HQ, visiting all assigned jobs, then back to HQ.
// Uses waypoint optimization (optimizeWaypoints: true).

async function optimizeRoute(crewId) {
  const member = crew.find(c => c.id === crewId);
  if (!member) return;

  const memberJobs = getCrewJobs(crewId);
  if (memberJobs.length < 1) {
    showToast(`⚠️ ${member.name} has no assigned jobs to route`, 'warn');
    return;
  }

  if (!mapsLoaded || !directionsService) {
    // Fallback: show route panel with nearest-neighbor approximation
    showFallbackRoute(member, memberJobs);
    return;
  }

  showToast(`🗺 Calculating optimal route for ${member.name}…`, 'info');

  const hq = CONFIG.COMPANY_HQ;
  const origin = new google.maps.LatLng(hq.lat, hq.lng);
  const destination = origin; // Round trip back to HQ

  const waypoints = memberJobs.map(job => ({
    location: new google.maps.LatLng(job.lat, job.lng),
    stopover: true,
  }));

  try {
    const result = await new Promise((resolve, reject) => {
      directionsService.route({
        origin, destination, waypoints,
        optimizeWaypoints: true, // Google optimizes the order!
        travelMode: google.maps.TravelMode.DRIVING,
      }, (res, status) => {
        if (status === 'OK') resolve(res);
        else reject(new Error(`Directions failed: ${status}`));
      });
    });

    directionsRenderer.setDirections(result);

    // Display route panel
    const route = result.routes[0];
    const optimizedOrder = route.waypoint_order;
    const orderedJobs = optimizedOrder.map(i => memberJobs[i]);

    let totalDist = 0, totalTime = 0;
    route.legs.forEach(leg => {
      totalDist += leg.distance.value;
      totalTime += leg.duration.value;
    });

    showRoutePanel(member, orderedJobs, route.legs, totalDist, totalTime);
    showToast(`✓ Route optimized — ${(totalDist/1609).toFixed(1)} mi, ${Math.round(totalTime/60)} min`, 'success');

  } catch (err) {
    console.error('[Route]', err);
    showFallbackRoute(member, memberJobs);
  }
}

function showRoutePanel(member, orderedJobs, legs, totalDist, totalTime) {
  const panel = document.getElementById('routePanel');
  document.getElementById('routePanelTitle').textContent = `Route — ${member.name}`;

  let stopsHTML = `
    <div class="route-stop" style="position:relative">
      <div class="route-stop-num" style="background:var(--accent-cyan)">HQ</div>
      <div class="route-stop-info">
        <div class="route-stop-name">${CONFIG.COMPANY_HQ.label}</div>
        <div class="route-stop-time">Start</div>
      </div>
      ${orderedJobs.length > 0 ? '<div class="route-line"></div>' : ''}
    </div>`;

  orderedJobs.forEach((job, i) => {
    const leg = legs[i];
    const st = STATUSES[job.status];
    stopsHTML += `
      <div class="route-stop" style="position:relative">
        <div class="route-stop-num" style="background:${member.color}">${i + 1}</div>
        <div class="route-stop-info">
          <div class="route-stop-name">${job.customer}</div>
          <div class="route-stop-time">${job.time} · ${leg ? leg.duration.text : ''} drive</div>
        </div>
        ${i < orderedJobs.length - 1 ? '<div class="route-line"></div>' : ''}
      </div>`;
  });

  document.getElementById('routeStops').innerHTML = stopsHTML;
  document.getElementById('routeSummary').innerHTML = `
    <span>Total: <strong>${(totalDist / 1609.34).toFixed(1)} mi</strong></span>
    <span>Drive: <strong>${Math.round(totalTime / 60)} min</strong></span>
    <span>Stops: <strong>${orderedJobs.length}</strong></span>
  `;
  panel.classList.add('visible');
}

function showFallbackRoute(member, memberJobs) {
  // Nearest-neighbor approximation when Directions API isn't available
  const ordered = [...memberJobs];
  const hq = CONFIG.COMPANY_HQ;

  // Simple nearest-neighbor sort from HQ
  const sorted = [];
  let current = { lat: hq.lat, lng: hq.lng };
  const remaining = [...ordered];
  while (remaining.length > 0) {
    let nearest = 0, nearestDist = Infinity;
    remaining.forEach((j, i) => {
      const d = Math.hypot(j.lat - current.lat, j.lng - current.lng);
      if (d < nearestDist) { nearestDist = d; nearest = i; }
    });
    sorted.push(remaining.splice(nearest, 1)[0]);
    current = { lat: sorted[sorted.length-1].lat, lng: sorted[sorted.length-1].lng };
  }

  // Estimate total distance (rough)
  let totalDist = 0;
  let prev = hq;
  sorted.forEach(j => {
    totalDist += Math.hypot(j.lat - prev.lat, j.lng - prev.lng) * 111000; // ~meters
    prev = j;
  });

  showRoutePanel(member, sorted, [], totalDist, Math.round(totalDist / 600));
  showToast(`✓ Route estimated for ${member.name} (nearest-neighbor)`, 'success');
}

function closeRoutePanel() {
  document.getElementById('routePanel').classList.remove('visible');
  if (directionsRenderer) directionsRenderer.setDirections({ routes: [] });
}

  el.innerHTML = `<div class="fallback-map"><div class="fallback-grid"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5">
      <div style="font-size:48px;margin-bottom:12px">🗺️</div>
      <div style="font-size:15px;font-weight:600;color:#f1f5f9;margin-bottom:6px">Set Google Maps API Key</div>
      <div style="font-size:12px;color:#64748b;max-width:300px;line-height:1.5">
        Add your key to <code style="color:#06b6d4">CONFIG.GOOGLE_MAPS_API_KEY</code> at the top of this file.<br>All dispatch features work with this fallback.
      </div>
    </div>
    ${jobs.map(job => {
      const st = STATUSES[job.status]; const assigned = job.assignedTo ? crew.find(c => c.id === job.assignedTo) : null;
      const c = assigned ? assigned.color : st.color;
      const x = ((job.lng - (-83.75)) / 0.28) * 100; const y = ((41.80 - job.lat) / 0.22) * 100;
      return `<div class="fallback-pin" style="left:${x}%;top:${y}%;background:${c};box-shadow:0 0 10px ${c}44" onclick="openJobModal('${job.id}')" title="${job.customer} — ${job.time}"></div>`;
    }).join('')}
  </div>`;
}


// ═══════════════════════════════════════
// PANEL RENDERING
// ═══════════════════════════════════════

function getCrewJobs(crewId) { return jobs.filter(j => j.assignedTo === crewId); }

function renderDate() {
  const d = new Date();
  document.getElementById('dateDisplay').textContent =
    d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' }) +
    ' • ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}

function renderCounts() {
  const unassigned = jobs.filter(j => j.status === 'unassigned').length;
  document.getElementById('countAll').textContent = jobs.length;
  document.getElementById('countUnassigned').textContent = unassigned;
  document.getElementById('countSales').textContent = jobs.filter(j => j.type === 'sales').length;
  document.getElementById('countInstall').textContent = jobs.filter(j => j.type === 'install' || j.type === 'service').length;
  document.getElementById('statAvailable').textContent = crew.filter(c => c.status === 'available').length;
  document.getElementById('statBusy').textContent = crew.filter(c => c.status === 'busy').length;
  document.getElementById('statUnassigned').textContent = unassigned;
}

function renderJobs(filter = 'all', search = '') {
  const list = document.getElementById('jobsList');
  let filtered = [...jobs];
  if (filter === 'unassigned') filtered = filtered.filter(j => j.status === 'unassigned');
  else if (filter === 'sales') filtered = filtered.filter(j => j.type === 'sales');
  else if (filter === 'install') filtered = filtered.filter(j => j.type === 'install' || j.type === 'service');
  if (search) { const s = search.toLowerCase(); filtered = filtered.filter(j => j.title.toLowerCase().includes(s) || j.customer.toLowerCase().includes(s) || j.id.toLowerCase().includes(s) || j.address.toLowerCase().includes(s)); }

  list.innerHTML = filtered.map(job => {
    const st = STATUSES[job.status]; const assigned = job.assignedTo ? crew.find(c => c.id === job.assignedTo) : null;
    return `<div class="job-card fade-in" draggable="true" data-job-id="${job.id}" onmouseenter="highlightPin('${job.id}')" onmouseleave="unhighlightPin('${job.id}')">
      <div class="status-stripe" style="background:${st.color}"></div>
      <div class="job-header"><span class="job-id">${job.id}</span><span class="job-type-badge badge-${job.type}">${job.type}</span></div>
      <div class="job-title">${job.title}</div>
      <div class="job-address">${job.address}</div>
      <div class="job-meta">
        <span class="job-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${job.time}</span>
        <span class="status-pill" style="background:${st.color}22;color:${st.color}"><span style="width:5px;height:5px;border-radius:50%;background:${st.color};display:inline-block"></span>${st.label}</span>
      </div>
      ${assigned ? `<div class="assigned-to"><div class="assigned-avatar" style="background:${assigned.color}">${assigned.avatar}</div><span>${assigned.name}</span></div>` : ''}
    </div>`;
  }).join('');

  list.querySelectorAll('.job-card').forEach(card => {
    card.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', card.dataset.jobId); card.classList.add('dragging'); });
    card.addEventListener('dragend', () => { card.classList.remove('dragging'); document.querySelectorAll('.crew-card.drop-target').forEach(c => c.classList.remove('drop-target')); });
    card.addEventListener('click', () => openJobModal(card.dataset.jobId));
  });
}

function renderCrew() {
  const list = document.getElementById('crewList');
  list.innerHTML = crew.map(member => {
    const mJobs = getCrewJobs(member.id); const load = mJobs.length;
    const pct = Math.round((load / member.maxJobs) * 100);
    const barColor = pct >= 90 ? 'var(--accent-red)' : pct >= 60 ? 'var(--accent-amber)' : 'var(--accent-green)';
    const zC = { north:'var(--accent-blue)', south:'var(--accent-green)', east:'var(--accent-amber)', west:'var(--accent-purple)' };
    return `<div class="crew-card" data-crew-id="${member.id}">
      <div class="crew-header">
        <div class="crew-avatar" style="background:${member.color}">${member.avatar}</div>
        <div class="crew-info"><div class="crew-name">${member.name}</div><div class="crew-role">${member.role}</div></div>
        <div class="crew-status-dot ${member.status}"></div>
      </div>
      <div class="crew-capacity">
        <div class="capacity-bar-bg"><div class="capacity-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        <div class="capacity-text"><span>${load} / ${member.maxJobs} jobs</span><span>${pct}%</span></div>
      </div>
      <span class="crew-zone" style="background:${zC[member.zone]}22;color:${zC[member.zone]}">${member.zone.charAt(0).toUpperCase() + member.zone.slice(1)} Zone</span>
      ${mJobs.length > 0 ? `<div class="crew-jobs">${mJobs.map(j => `<div class="crew-job-mini"><span class="mini-dot" style="background:${STATUSES[j.status].color}"></span>${j.customer} — ${j.time}</div>`).join('')}</div>` : ''}
      ${load > 0 ? `<button class="crew-route-btn" onclick="event.stopPropagation();optimizeRoute('${member.id}')">🧭 Optimize Route</button>` : ''}
    </div>`;
  }).join('');

  list.querySelectorAll('.crew-card').forEach(card => {
    card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drop-target'); });
    card.addEventListener('dragleave', () => card.classList.remove('drop-target'));
    card.addEventListener('drop', e => { e.preventDefault(); card.classList.remove('drop-target'); assignJob(e.dataTransfer.getData('text/plain'), card.dataset.crewId); });
  });
}


// ═══════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════

async function assignJob(jobId, crewId) {
  const job = jobs.find(j => j.id === jobId);
  const member = crew.find(c => c.id === crewId);
  if (!job || !member) return;
  if (getCrewJobs(crewId).length >= member.maxJobs) { showToast(`⚠️ ${member.name} is at full capacity!`, 'warn'); return; }

  job.assignedTo = crewId;
  job.status = 'assigned';
  member.status = 'busy';

  // Push to GHL in background
  GHL.saveAssignment(jobId, crewId, 'assigned');
  if (job.ghlContactId) {
    GHL.addDispatchNote(job.ghlContactId, `Dispatched to ${member.name} via Dispatch Board at ${new Date().toLocaleString()}`);
  }

  renderAll();
  showToast(`✓ ${job.title} → ${member.name}`, 'success');
}

function openJobModal(jobId) {
  const job = jobs.find(j => j.id === jobId);
  if (!job) return;
  if (infoWindow) infoWindow.close();

  document.getElementById('modalTitle').textContent = job.id + ' — Route Job';
  const crewOptions = crew.map(c => {
    const load = getCrewJobs(c.id).length; const full = load >= c.maxJobs;
    return `<option value="${c.id}" ${job.assignedTo === c.id ? 'selected' : ''} ${full ? 'disabled' : ''}>${c.name} (${c.role}) — ${load}/${c.maxJobs}${full ? ' • FULL' : ''}</option>`;
  }).join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-field"><label>Customer</label><div class="field-val">${job.customer}</div></div>
    <div class="modal-field"><label>Job</label><div class="field-val">${job.title}</div></div>
    <div class="modal-field"><label>Address</label><div class="field-val">${job.address}</div></div>
    <div class="modal-field"><label>Time</label><div class="field-val">${job.time}</div></div>
    <div class="modal-field"><label>GHL Notes</label><div class="field-val" style="font-size:12px;color:var(--text-secondary)">${job.notes}</div></div>
    <div class="modal-field"><label>Assign To</label><select id="modalAssignSelect"><option value="">— Unassigned —</option>${crewOptions}</select></div>
    <div class="modal-field"><label>Status</label><select id="modalStatusSelect">
      ${Object.entries(STATUSES).map(([k,v]) => `<option value="${k}" ${job.status === k ? 'selected' : ''}>${v.label}</option>`).join('')}
    </select></div>`;

  document.getElementById('modalOverlay').classList.add('active');

  document.getElementById('modalConfirm').onclick = async () => {
    const selCrew = document.getElementById('modalAssignSelect').value;
    const selStatus = document.getElementById('modalStatusSelect').value;
    job.assignedTo = selCrew || null;
    job.status = selStatus;
    if (selCrew) { const m = crew.find(c => c.id === selCrew); if (m) m.status = 'busy'; }
    document.getElementById('modalOverlay').classList.remove('active');

    GHL.saveAssignment(job.id, selCrew, selStatus);
    renderAll();
    showToast(`✓ Updated ${job.id}`, 'success');
  };
}

document.getElementById('modalClose').onclick =
document.getElementById('modalCancel').onclick = () => document.getElementById('modalOverlay').classList.remove('active');

function showToast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span style="font-size:16px">${type==='success'?'✅':type==='warn'?'⚠️':'ℹ️'}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3500);
}


// ═══════════════════════════════════════
// FILTERS & INIT
// ═══════════════════════════════════════

let activeFilter = 'all';

document.getElementById('filterTabs').addEventListener('click', e => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeFilter = tab.dataset.filter;
  renderJobs(activeFilter, document.getElementById('searchBox').value);
});

document.getElementById('searchBox').addEventListener('input', e => {
  renderJobs(activeFilter, e.target.value);
});

function renderAll() {
  renderDate();
  renderCounts();
  renderJobs(activeFilter, document.getElementById('searchBox').value);
  renderCrew();
  if (mapsLoaded) renderMapMarkers();
  else renderFallbackMap();
}

// ── Boot ──
renderAll();
setInterval(renderDate, 60000);
GHL.startAutoSync();
</script>
